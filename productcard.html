<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
        }

        h1 {
            text-align: center;
            margin: 20px 0;
            color: #333;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .card h5 {
            font-size: 14px;
            color: #444;
            height: 40px;
            overflow: hidden;
        }

        .card h4 {
            color: #2ecc71;
            margin: 10px 0;
        }

        .card button {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: #007bff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .card button:hover {
            background: #0056b3;
        }



        /* Cart Icon
        #cart-icon {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #fff;
            padding: 10px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            font-size: 18px;
            z-index: 1000;
        }

        /* Cart Count Badge */
        /* #cart-count {
            background: red;
            color: white;
            border-radius: 50%;
            padding: 3px 8px;
            font-size: 12px;
            margin-left: 5px;
        } */ */
    </style>
</head>

<body>
    <h1>Product Card</h1>

    <!-- <div id="cart-icon">
        🛒 <span id="cart-count">0</span>
    </div> -->

    <div id="container">

    </div>
    <script>


        let container = document.getElementById("container")

        // function updateCartCount() {
        //     let count = cart.reduce((total, item) => total + item.quantity, 0);
        //     document.getElementById("cart-count").innerText = count;
        // }

        // function addToCart(product) {
        //     let existing = cart.find(item => item.id === product.id);

        //     if (existing) {
        //         existing.quantity += 1;
        //     } else {
        //         cart.push({ ...product, quantity: 1 });
        //     }

        //     updateCartCount(); // 🔥 update UI
        //     console.log("Cart:", cart);
        // }

        fetch("https://dummyjson.com/products")
            .then(res => res.json())
            .then(data => productCart(data.products));

        function productCart(product) {
            console.log(product)
            product.forEach(element => {
                let card = document.createElement("div")
                card.className = "card"

                let image = document.createElement("img")
                image.src = element.thumbnail;



                let title = document.createElement("h5")
                title.innerText = element.title;

                let price = document.createElement("h4")
                price.innerText = "₹ " + element.price;

                let cartbtn = document.createElement("button")
                cartbtn.innerText = "Add to Card";

                card.append(image, title, price, cartbtn);

                // card.appendChild(image);
                // card.appendChild(title);
                // card.appendChild(price);
                // card.appendChild(cartbtn);

                container.appendChild(card)

            });
        }



    </script>
</body>

</html>
